title: Fontainebleau Muslim Association
description: >-
  The official website of the Fontainebleau Muslim Association (FMA),
  serving the Muslim community of Fontainebleau, Randburg, Johannesburg.
url: "https://fma-ma.github.io"
baseurl: "/masjid_site"

timezone: Africa/Johannesburg

markdown: kramdown
permalink: pretty

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - GOOGLE_SHEETS_SETUP.md
  - MAINTAINERS.md
  - masjid/

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"

plugins:
  - jekyll-seo-tag

# MasjidBoard Live board URL — change this once FMA is registered
masjidboard_url: "https://masjidboardlive.com/boards/?roosevelt-park-raudhatul-islam"

# LiveMasjid.com — change mount name to FMA's once registered
# minimount.php is the embeddable mini player (same as MasjidBoard uses)
# Using Roosevelt Park as example until FMA is registered
livemasjid_mount: "rsvltmasjid"
livemasjid_player: "https://www.livemasjid.com/minimount.php?mount=rsvltmasjid"
livemasjid_page: "https://www.livemasjid.com/rsvltmasjid"

# Google Sheets published-as-CSV URLs — see GOOGLE_SHEETS_SETUP.md
sheets:
  announcements: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ3vX2rH4eE2ZLjiJ-Y7FKw6Bsh3LOki_QpnV3JQCSiN4yBsXaisn8OQwnOKohIQaF1x5XFnKTc6dI8/pub?gid=0&single=true&output=csv"
  programmes: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ3vX2rH4eE2ZLjiJ-Y7FKw6Bsh3LOki_QpnV3JQCSiN4yBsXaisn8OQwnOKohIQaF1x5XFnKTc6dI8/pub?gid=1060830073&single=true&output=csv"
  # Salaah times tab — columns: Salaah, Begins, Jamaat
  # Add a new tab to the same spreadsheet, publish as CSV, and paste the URL below
  salaah: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ3vX2rH4eE2ZLjiJ-Y7FKw6Bsh3LOki_QpnV3JQCSiN4yBsXaisn8OQwnOKohIQaF1x5XFnKTc6dI8/pub?gid=1954153707&single=true&output=csv"
  # Future salaah times tab — same columns as above. Paste URL when ready.
  salaah_next: ""
